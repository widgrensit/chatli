# Use postgres/example user/password credentials
services:
  db:
    image: postgres:17-alpine
    command: -c 'max_connections=2000'
    environment:
      POSTGRES_PASSWORD: root
    ports:
      - 5555:5432
    volumes:
      - ./sql:/docker-entrypoint-initdb.d
  adminer:
    image: adminer
    ports:
      - 8082:8080
